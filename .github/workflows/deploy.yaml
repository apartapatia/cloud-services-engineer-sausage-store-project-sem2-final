name: Sausage Store Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      only_docker:
        description: 'Run ONLY Docker Hub build and push'
        type: boolean
        required: false
        default: false

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: r-devops-magistracy-project-2sem-1716536500
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  VAULT_HOST: ${{ vars.VAULT_HOST }}
  INGRESS_HOST: ${{ vars.INGRESS_HOST }}

jobs:
  # Сборка и пуш образов в докерхаб:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          uses: actions/checkout@v3
          
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v2
          
        - name: Login to Docker 
          uses: docker/login-action@v2
          with:
            username: ${{ env.DOCKER_USER }}
            password: ${{ env.DOCKER_PASSWORD }}
            
        - name: Push Backend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend/
            push: true
            tags: |
              ${{ env.DOCKER_USER }}/sausage-backend:latest
              ${{ env.DOCKER_USER }}/sausage-backend:${{ github.sha }}
            build-args: |
              VERSION=${{ github.sha }}
              
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: |
              ${{ env.DOCKER_USER }}/sausage-frontend:latest
              ${{ env.DOCKER_USER }}/sausage-frontend:${{ github.sha }}
            
        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            push: true
            tags: |
              ${{ env.DOCKER_USER }}/sausage-backend-report:latest
              ${{ env.DOCKER_USER }}/sausage-backend-report:${{ github.sha }}

  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
      name: Add Helm Chart To Nexus
      runs-on: ubuntu-latest
      needs: build_and_push_to_docker_hub
      if: ${{ !inputs.only_docker }}

      steps:
        - name: Check out the repo
          uses: actions/checkout@v3

        - name: Set up Helm
          uses: azure/setup-helm@v5.0.0

        - name: Package and Push Helm Chart
          run: |
            helm package ./sausage-store-chart
            CHART_PKG=$(ls sausage-store-*.tgz)
            curl -u "${{ env.NEXUS_HELM_REPO_USER }}:${{ env.NEXUS_HELM_REPO_PASSWORD }}" ${{ env.NEXUS_HELM_REPO }} --upload-file $CHART_PKG

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
      name: Deploy Helm Chart To Kubernetes
      runs-on: ubuntu-latest
      needs: add_helm_chart_to_nexus
      if: ${{ !inputs.only_docker }}

      steps:
        - name: Check out the repo
          uses: actions/checkout@v3

        - name: Set up Helm
          uses: azure/setup-helm@v5.0.0

        - name: Deploy with Helm
          run: |
            mkdir -p ~/.kube
            echo "$KUBE_CONFIG" > ~/.kube/config
            chmod 600 ~/.kube/config

            helm upgrade --install sausage-store ./sausage-store-chart \
              --namespace ${{ env.SAUSAGE_STORE_NAMESPACE }} \
              --set global.vault.host=${{ env.VAULT_HOST }} \
              --set global.vault.vaultToken=${{ env.VAULT_TOKEN }} \
              --set frontend.image=${{ env.DOCKER_USER }}/sausage-frontend:${{ github.sha }} \
              --set backend.image=${{ env.DOCKER_USER }}/sausage-backend:${{ github.sha }} \
              --set backend-report.image=${{ env.DOCKER_USER }}/sausage-backend-report:${{ github.sha }} \
              --set frontend.ingress.host=${{ env.INGRESS_HOST }}