{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  labels:
    app: postgresql
type: Opaque
data:
  postgres-password: {{ required "postgresql.env.POSTGRES_PASSWORD is required" .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  store-user: {{ required "postgresql.env.STORE_USER is required" .Values.postgresql.env.STORE_USER | b64enc | quote }}
  store-password: {{ required "postgresql.env.STORE_PASSWORD is required" .Values.postgresql.env.STORE_PASSWORD | b64enc | quote }}
{{- end }}
