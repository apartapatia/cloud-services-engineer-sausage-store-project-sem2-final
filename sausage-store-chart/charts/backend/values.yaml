replicas: 1
revisionHistoryLimit: 15
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
containerPort: 8080
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "1"
env:
  postgresUri: jdbc:postgresql://postgresql:5432/sausage_store
  postgresUser: store
  reportPath: /logs/reports
  logPath: /logs
livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
vpa:
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          memory: "128Mi"
          cpu: "50m"
        maxAllowed:
          memory: "1Gi"
          cpu: "2"
