{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.postgresql.service.name }}
  labels:
    app: postgresql
spec:
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: {{ .Values.postgresql.containerPort }}
      protocol: TCP
  selector:
    app: postgresql
  clusterIP: None
{{- end }}
